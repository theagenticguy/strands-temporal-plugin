name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions: read-all

env:
  UV_CACHE_DIR: .uv-cache

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: ghcr.io/astral-sh/uv:0.9-python3.13-bookworm-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Restore uv cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ hashFiles('uv.lock') }}
          restore-keys: uv-
      - name: Build package
        run: uv build
      - name: Upload dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/
      - name: Extract changelog
        id: changelog
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          NOTES=$(sed -n "/^## v${VERSION}/,/^## v/{/^## v/d;p}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${{ github.ref_name }}"
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*
          generate_release_notes: false

  pypi:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/strands-temporal-plugin
    steps:
      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b54f72e44af3222f3f2f751c # v1.12.4
